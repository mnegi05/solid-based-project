version: "3.9"

services:
  app:
    build: .
    container_name: solid_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/soliddb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: soliddb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata: